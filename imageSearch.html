<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boogle Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="links">
        <ul>
            <li><a href="index.html">Search</a></li>
            <li><a href="advancedSearch.html">Advanced Search</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <div class="boogle-img-logo">
                <h1 class="boogle-logo">Boogle</h1>
                <p class="sub-text">Images</p>
            </div>
            <form action="https://www.google.com/search">
                <div class="search-input">
                    <img src="images/search-btn.svg" class="icon">
                    <input type="text" name="q" class="search-bar" placeholder="Search">
                    <input type="hidden" name="tbm" value="isch">
                </div>
                <input type="submit" value="Google Search">
            </form> 
        </div>
    </div>
</body>
</html>
