<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boogle Advanced Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="advanced-page">
    <nav class="links">
        <ul>
            <li><h2 class="boogle-logo-advanced">Boogle</h2></li>
            <li><a href="index.html">Search</a></li>
        </ul>
    </nav>
    <hr>
    <form class="adv-card" action="https://google.com/search" method="get">
        <h1>Advanced Search</h1>
        <h2>Find pages with</h2>
        <div class="input-grid">
            <p>All of these words:</p>
            <input type="text" name="as_q">

            <p>This exact word or phrase:</p>
            <input type="text" name="as_epq">

            <p>None of these words:</p>
            <input type="text" name="as_eq">

            <p>Site or domain:</p>
            <input type="text" name="as_sitesearch">

            <input type="submit" value="Advanced Search" class="adv-search-btn">
        </div>
    </form>
</body>
</html>
