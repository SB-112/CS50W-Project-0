<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boogle Advanced Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="advanced-page">
    <nav class="links">
        <ul>
            <li><h2 class="boogle-logo-advanced"><a href="index.html">Boogle</a></h2></li>
            <li><a href="index.html">Boogle Search</a></li>
        </ul>
    </nav>
    <hr>
    <form class="adv-card" action="https://google.com/search" method="get">
        <h1>Advanced Search</h1>
        <h2>Find pages with</h2>
        <div class="input-grid">
            <label for="all-words">All these words:</label >
            <input type="text" name="as_q" id="all-words">

            <label for="exact-words">This exact word or phrase:</label>
            <input type="text" name="as_epq" id="exact-words">

            <label for="any-words">Any of these words:</label>
            <input type="text" name="as_oq" id="any-words">

            <label for="none-words">None of these words:</label>
            <input type="text" name="as_eq" id="none-words">

            <input type="submit" value="Advanced Search" class="adv-search-btn">
        </div>
    </form>
</body>
</html>
