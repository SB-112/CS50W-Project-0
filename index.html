<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boogle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="links">
        <ul>
            <li><a href="imageSearch.html">Boogle Images</a></li>
            <li><a href="advancedSearch.html">Boogle Advanced Search</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h1 class="boogle-logo">Boogle</h1>
            <form action="https://www.google.com/search" method="get">
                <div class="search-input">
                    <img src="images/search-btn.svg" class="icon">
                    <input type="text" name="q" class="search-bar" placeholder="Search">
                </div>
                <input type="submit" value="Google Search">
                <input type="submit" name="btnI" value="I'm Feeling Lucky">
            </form> 
        </div>
    </div>
</body>
</html>
